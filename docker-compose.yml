services:
  db:
    image: postgis/postgis:16-3.4
    container_name: portalgis_idecam_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portalgis_idecam
    ports:
      - "5432:5432"
    volumes:
      - portalgis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portalgis_idecam"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: portalgis_idecam_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/portalgis_idecam?schema=public"
      PORT: "3001"
      DATA_DIR: "/app/data"
    volumes:
      - ./data:/app/data
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: portalgis_idecam_web
    restart: unless-stopped
    environment:
      API_PROXY_TARGET: "http://api:3001"
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  portalgis_pgdata:
